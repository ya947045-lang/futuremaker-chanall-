<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Maker Projects</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:40px;
font-size:35px;
font-weight:600;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
}

.card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:25px;
transition:0.4s;
position:relative;
overflow:hidden;

}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card h2{
margin-bottom:10px;
}

.card p{
opacity:0.8;
margin-bottom:20px;
}

.download{

display:inline-block;
padding:10px 20px;
border-radius:10px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;

}

.download:hover{
transform:scale(1.1);
}

footer{
text-align:center;
padding:30px;
opacity:0.6;
}

.glow{
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,#00eaff,transparent);
top:-50px;
right:-50px;
opacity:0.5;
}

</style>
</head>

<body>

<header>
Future Maker Projects
</header>

<div class="container" id="projects"></div>

<footer>
Made by Future Maker
</footer>

<script>

function loadProjects(){

let projects = JSON.parse(localStorage.getItem("projects")) || []

let container = document.getElementById("projects")

container.innerHTML=""

projects.forEach(p=>{

container.innerHTML+=`

<div class="card">

<div class="glow"></div>

<h2>${p.title}</h2>

<p>${p.desc}</p>

<a class="download" href="${p.link}" target="_blank">Download</a>

</div>

`

})

}

loadProjects()

</script>

</body>
</html>
